name: Deploy

on:
  push:
    branches: [main]

# Each job triggers a provider deploy hook. The hooks are stored as repository
# secrets; until they are configured the step skips gracefully instead of
# failing the workflow, so the pipeline stays green before cloud provisioning.
jobs:
  deploy-web:
    name: Deploy Web → Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Netlify deploy hook
        env:
          HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK"
          else
            echo "NETLIFY_DEPLOY_HOOK not set — skipping deploy."
          fi

  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render API deploy
        env:
          HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK"
          else
            echo "RENDER_API_DEPLOY_HOOK not set — skipping deploy."
          fi

  deploy-mining:
    name: Deploy Mining → Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Mining deploy
        env:
          HOOK: ${{ secrets.RENDER_MINING_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK"
          else
            echo "RENDER_MINING_DEPLOY_HOOK not set — skipping deploy."
          fi
